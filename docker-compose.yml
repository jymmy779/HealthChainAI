version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthchain-db
    restart: always
    environment:
      POSTGRES_USER: healthchain_user
      POSTGRES_PASSWORD: healthchain_password
      POSTGRES_DB: healthchain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
